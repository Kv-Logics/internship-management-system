version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ims_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - backend_signatures:/app/signatures
      - backend_certificates:/app/generated_certificates
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ims_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      - backend
    networks:
      - ims_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "6006:80"
      - "6443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - ims_network

networks:
  ims_network:
    driver: bridge

volumes:
  pgdata:
  backend_signatures:
  backend_certificates:
  backend_uploads:
