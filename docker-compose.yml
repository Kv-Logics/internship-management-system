version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "5431:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ims_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend/signatures:/app/signatures
      - ./backend/generated_certificates:/app/generated_certificates
      - ./backend/temp_previews:/app/temp_previews
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ims_network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - ims_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

networks:
  ims_network:
    driver: bridge

volumes:
  pgdata:
