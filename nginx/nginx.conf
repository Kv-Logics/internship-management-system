events {
    worker_connections 1024;
}

http {
    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "frame-ancestors 'self';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Allow large file uploads (reports/documents)
    client_max_body_size 25M;

    server {
        listen 80;
        server_name ims.nitt.edu;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            # Redirect to HTTPS once SSL is set up.
            # For now, it will serve HTTP traffic.
            # return 301 https://$host$request_uri;
            
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            proxy_pass http://backend:8000;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /generated_certificates/ {
            proxy_pass http://backend:8000;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /signatures/ {
            proxy_pass http://backend:8000;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /docs {
            proxy_pass http://backend:8000;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /openapi.json {
            proxy_pass http://backend:8000;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    
    # Uncomment the following block AFTER running certbot to enable HTTPS
    # server {
    #     listen 443 ssl;
